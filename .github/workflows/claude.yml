name: Claude Code

on:
    issue_comment:
        types: [created]
    pull_request_review_comment:
        types: [created]
    issues:
        types: [opened, assigned]
    pull_request_review:
        types: [submitted]

jobs:
    claude:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read # Required for Claude to read CI results on PRs
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Run Project Setup
              run: |
                  echo "Install dependencies and build project"
                  npm install
                  npm run start

            - name: Run Claude Code
              id: claude
              uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

                  custom_instructions: |
                      The project is already set up with all dependencies.
                      It runs on localhost:1337. If needed - use mcp__playwright to interact with the app and get any information you need.
                  mcp_config: |
                      {
                        "mcpServers": {
                          "playwright": {
                            "command": "npx",
                            "args": [
                              "@playwright/mcp@latest",
                              "--allowed-origins",
                              "localhost:1337"
                            ]
                          }
                        }
                      }
                  allowed_tools: "Bash(npm:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_fill,mcp__playwright__browser_navigate"
